<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="400" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">tabsmith — completions forged from --help</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> tabsmith gen --out completions ./shipctl</text>
  <text x="20" y="76" fill="#c8ceda">tabsmith: parsed shipctl: <tspan fill="#61afef">13 flags</tspan>, <tspan fill="#61afef">4 subcommands</tspan></text>
  <text x="20" y="94" fill="#8b93a7">tabsmith: wrote completions/shipctl.bash</text>
  <text x="20" y="112" fill="#8b93a7">tabsmith: wrote completions/_shipctl</text>
  <text x="20" y="130" fill="#8b93a7">tabsmith: wrote completions/shipctl.fish</text>

  <text x="20" y="162" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> source completions/shipctl.bash</text>

  <text x="20" y="192" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shipctl dep<tspan fill="#5c6370">&lt;Tab&gt;</tspan></text>
  <text x="20" y="212" fill="#c8ceda"><tspan fill="#28c840">$</tspan> shipctl deploy</text>

  <text x="20" y="242" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shipctl deploy --strategy <tspan fill="#5c6370">&lt;Tab&gt;&lt;Tab&gt;</tspan></text>
  <text x="20" y="262" fill="#c8ceda">bluegreen  canary  rolling</text>
  <text x="20" y="280" fill="#5c6370"># mined from "one of: rolling, canary, bluegreen" in the help text</text>

  <text x="20" y="310" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shipctl deploy history --<tspan fill="#5c6370">&lt;Tab&gt;&lt;Tab&gt;</tspan></text>
  <text x="20" y="330" fill="#c8ceda">--json  --limit</text>
  <text x="20" y="348" fill="#5c6370"># nested subcommands probed via `shipctl deploy history --help`</text>

  <text x="20" y="382" fill="#8b93a7">no grammar file · no plugin · works on binaries you don't own</text>
